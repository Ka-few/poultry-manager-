<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#184f3b" />
    <title>Poultry Manager</title>
  </head>
  <body>
    <div id="root">
      <main style="min-height:100vh;display:grid;place-content:center;padding:24px;background:#f5f7f2;color:#184f3b;font-family:Arial,sans-serif;text-align:center">
        <h1 style="margin:0 0 12px;font-size:28px">Poultry Manager is starting...</h1>
        <p style="margin:0;color:#42594e;font-size:18px">If this message stays on screen, the app bundle did not start.</p>
      </main>
    </div>
    <script>
      document.body.setAttribute('data-inline-js', 'running');
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.textContent && root.textContent.indexOf('Poultry Manager is starting') !== -1) {
          root.innerHTML = '<main style="min-height:100vh;display:grid;place-content:center;padding:24px;background:#fff7f4;color:#7b2418;font-family:Arial,sans-serif;text-align:center"><h1 style="margin:0 0 12px;font-size:28px">JavaScript works, app bundle did not load</h1><p style="margin:0;font-size:18px">The Android WebView can run inline JavaScript, but it did not load the packaged React bundle.</p></main>';
        }
      }, 3000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
